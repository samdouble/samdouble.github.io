name: Lint Commit Messages
on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Commitlint
        uses: wagoid/commitlint-github-action@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0'
      - name: Test
        run: |
          npm test
      - name: Build
        run: |
          npm run build
