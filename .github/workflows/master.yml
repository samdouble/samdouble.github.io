name: Deploy
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0'
      - name: Install
        run: |
          npm install
      - name: Test
        run: |
          npm test
      - name: Build
        run: |
          npm run build
      - name: Deploy
        run: |
          npm run deploy
